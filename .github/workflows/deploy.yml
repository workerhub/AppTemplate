name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WRANGLER_SEND_METRICS: "false"
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:web

      - name: Patch wrangler.toml
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ vars.KV_NAMESPACE_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SETUP_SECRET: ${{ secrets.SETUP_SECRET }}
          TABLE_PREFIX: ${{ vars.TABLE_PREFIX }}
        run: |
          sed -i "s/CLOUDFLARE_ACCOUNT_ID_PLACEHOLDER/${CLOUDFLARE_ACCOUNT_ID}/" wrangler.toml
          sed -i "s/D1_DATABASE_NAME_PLACEHOLDER/${D1_DATABASE_NAME}/g" wrangler.toml
          sed -i "s/D1_DATABASE_ID_PLACEHOLDER/${D1_DATABASE_ID}/g" wrangler.toml
          sed -i "s/KV_NAMESPACE_ID_PLACEHOLDER/${KV_NAMESPACE_ID}/g" wrangler.toml
          sed -i "s/JWT_SECRET_PLACEHOLDER/${JWT_SECRET}/" wrangler.toml
          sed -i "s/SETUP_SECRET_PLACEHOLDER/${SETUP_SECRET}/" wrangler.toml
          sed -i "s/TABLE_PREFIX_PLACEHOLDER/${TABLE_PREFIX}/" wrangler.toml

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm exec wrangler deploy 2>&1 | tee deploy.log
          DEPLOY_URL=$(grep -oP 'https://[^\s]+\.workers\.dev' deploy.log | head -1)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Initialize database
        if: env.DEPLOY_URL != ''
        env:
          SETUP_SECRET: ${{ secrets.SETUP_SECRET }}
        run: |
          echo "Calling setup: ${DEPLOY_URL}/api/setup/***"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}/api/setup/${SETUP_SECRET}")
          if [ "$STATUS" = "200" ]; then
            echo "Database initialized successfully"
          else
            echo "Setup returned HTTP $STATUS (may already be initialized)"
          fi
